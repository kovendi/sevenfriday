<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SevenFriday Shop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="app-stage">
        <div id="appbar-slot"></div>

        <section class="app-stage__content">
          <section class="watch-screen shop-screen" aria-label="Shop content">
            <header class="watch-screen__hero shop-hero">
              <div>
                <h1 class="watch-screen__title">Shop</h1>
                <p class="watch-screen__lede">
                  Browse official shop sections. Each card opens an external destination, so this screen acts as an entry point only.
                </p>
              </div>
            </header>

            <div class="watch-screen__divider"></div>

            <section class="shop-section" aria-labelledby="shop-categories-title">
              <h2 class="watch-screen__count" id="shop-categories-title">Shop categories</h2>
              <div id="shop-categories" class="shop-grid" data-component="ShopSection"></div>
            </section>
          </section>
        </section>

        <div id="bottom-nav-slot"></div>
      </div>
    </main>

    <script src="./svg.js"></script>
    <script src="./appbar.js"></script>
    <script src="./navbar.js"></script>
    <script>
      const shopCategories = [
        {
          title: 'Watches',
          subtitle: 'Explore collection',
          href: 'https://www.sevenfriday.com/collections/watches',
          imageAlt: 'Watch collection preview',
          imageSrc: './assets/watches.png',
          badge: 'Shop now',
        },
        {
          title: 'Straps & Bracelets',
          subtitle: 'Customize your watch',
          href: 'https://www.sevenfriday.com/collections/straps-bracelets',
          imageAlt: 'Straps and bracelets preview',
          imageSrc: './assets/bracelet.png',
          badge: 'Customize',
        },
        {
          title: 'Accessories',
          subtitle: 'Complete your setup',
          href: 'https://www.sevenfriday.com/collections/apparel',
          imageAlt: 'Accessories preview',
          imageSrc: './assets/cap.png',
          badge: 'Discover',
        },
      ];

      function escapeXml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&apos;');
      }

      function createShopCard(item) {
        const card = document.createElement('a');
        card.className = 'watch-card shop-card';
        card.href = item.href;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.setAttribute('aria-label', `${item.title}. Open external shop section`);

        card.innerHTML = `
          <div class="watch-card__image-wrap shop-card__image-wrap">
            <img class="watch-card__image" src="${item.imageSrc}" alt="${escapeXml(item.imageAlt)}" />
          </div>
          <div class="watch-card__content">
            <div>
              <h3 class="watch-card__title">${escapeXml(item.title)}</h3>
              <p class="watch-card__secondary shop-card__secondary">${escapeXml(item.subtitle)}</p>
            </div>
            <div class="watch-card__footer">
              <span class="watch-card__tag shop-card__tag">${escapeXml(item.badge)}</span>
              <span class="watch-card__chevron" aria-hidden="true">↗</span>
            </div>
          </div>
        `;

        return card;
      }

      function renderShopSection(root) {
        root.innerHTML = '';
        shopCategories.forEach((item) => {
          root.appendChild(createShopCard(item));
        });
      }

      const bottomNavSlot = document.getElementById('bottom-nav-slot');
      const appbarSlot = document.getElementById('appbar-slot');
      const shopCategoriesRoot = document.getElementById('shop-categories');

      if (appbarSlot && window.renderAppBar) {
        appbarSlot.replaceWith(window.renderAppBar('Shop'));
      }

      if (shopCategoriesRoot) {
        renderShopSection(shopCategoriesRoot);
      }

      if (bottomNavSlot && window.renderNavbar) {
        bottomNavSlot.replaceWith(window.renderNavbar({ activeKey: 'shop' }));
      }
    </script>
  </body>
</html>
